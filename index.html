<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#185FA5">
<title>自动语音点名</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #185FA5; --primary-light: #E6F1FB;
    --success: #3B6D11; --success-light: #EAF3DE;
    --danger: #A32D2D; --danger-light: #FCEBEB;
    --warning: #854F0B; --warning-light: #FAEEDA;
    --gray: #5F5E5A; --gray-light: #F1EFE8;
    --border: rgba(0,0,0,0.12);
    --radius: 12px; --radius-sm: 8px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f5f4f0; min-height: 100vh; color: #2c2c2a;
    font-size: 15px; line-height: 1.6; -webkit-text-size-adjust: 100%;
  }
  .app { max-width: 520px; margin: 0 auto; padding: 16px 14px 80px; }

  /* Wechat Banner */
  .wechat-banner {
    background: #fff8e6; border: 1px solid #f5c518;
    border-radius: var(--radius-sm); padding: 10px 14px;
    margin-bottom: 14px; display: none; align-items: flex-start; gap: 10px;
  }
  .wechat-banner.show { display: flex; }
  .wechat-banner svg { flex-shrink: 0; margin-top: 2px; }
  .wechat-banner p { font-size: 13px; line-height: 1.5; color: #6b4700; }
  .wechat-banner strong { font-weight: 500; }

  .header { text-align: center; padding: 20px 0 16px; }
  .header h1 { font-size: 20px; font-weight: 500; color: #2c2c2a; margin-bottom: 5px; }
  .header p { font-size: 13px; color: #888780; }

  .card {
    background: #fff; border-radius: var(--radius);
    border: 0.5px solid var(--border); padding: 18px;
    margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .card-title {
    font-size: 14px; font-weight: 500; color: #2c2c2a;
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .step-badge {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--primary-light); color: var(--primary);
    font-size: 12px; font-weight: 500;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  button {
    border: 0.5px solid var(--border); border-radius: var(--radius-sm);
    background: #fff; font-size: 14px; padding: 10px 16px;
    cursor: pointer; font-family: inherit; color: #2c2c2a;
    display: flex; align-items: center; gap: 6px;
    transition: background .15s, border-color .15s; white-space: nowrap;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  button:active { background: #eeede9; }
  .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); flex: 1; justify-content: center; }
  .btn-primary:active { background: #0F4A85; }
  .btn-primary:disabled { background: #B5D4F4; border-color: #B5D4F4; cursor: not-allowed; }
  .btn-success { background: var(--success); color: #fff; border-color: var(--success); flex: 1; justify-content: center; }
  .btn-success:active { background: #2a5409; }
  .btn-danger { background: var(--danger); color: #fff; border-color: var(--danger); }
  .btn-danger:active { background: #7d1f1f; }
  .btn-row { display: flex; gap: 10px; margin-top: 12px; }

  /* Name list */
  .names-grid { display: flex; flex-wrap: wrap; gap: 8px; min-height: 40px; margin-bottom: 12px; }
  .name-chip {
    background: var(--gray-light); border: 0.5px solid var(--border);
    border-radius: 20px; padding: 6px 14px; font-size: 14px;
    display: flex; align-items: center; gap: 6px; transition: all .2s;
  }
  .name-chip.present { background: var(--success-light); border-color: #9FE1CB; color: var(--success); }
  .name-chip.absent { background: var(--danger-light); border-color: #F7C1C1; color: var(--danger); }
  .name-chip.calling { background: var(--warning-light); border-color: #FAC775; color: var(--warning); font-weight: 500; }
  .chip-remove {
    width: 18px; height: 18px; background: rgba(0,0,0,0.1); border: none;
    border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: inherit; padding: 0; flex-shrink: 0;
  }
  .add-name-row { display: flex; gap: 8px; margin-top: 8px; }
  .add-name-row input {
    flex: 1; border: 0.5px solid var(--border); border-radius: var(--radius-sm);
    padding: 10px 14px; font-size: 15px; font-family: inherit; outline: none;
    transition: border-color .15s;
  }
  .add-name-row input:focus { border-color: var(--primary); }
  .batch-input {
    width: 100%; border: 0.5px solid var(--border); border-radius: var(--radius-sm);
    padding: 10px 14px; font-size: 14px; font-family: inherit; outline: none;
    resize: vertical; min-height: 60px; transition: border-color .15s;
  }
  .batch-input:focus { border-color: var(--primary); }

  /* Call display */
  .call-display {
    text-align: center; padding: 32px 20px;
    background: var(--gray-light); border-radius: var(--radius-sm);
    margin-bottom: 14px; min-height: 120px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .current-name { font-size: 40px; font-weight: 500; color: var(--primary); letter-spacing: 5px; margin-bottom: 8px; transition: all .3s; }
  .call-status { font-size: 13px; color: #888780; }
  .call-progress { font-size: 13px; color: #888780; margin-bottom: 12px; }
  .call-controls { display: flex; gap: 10px; flex-wrap: wrap; }
  .settings-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
  .settings-row label { font-size: 13px; color: #5F5E5A; display: flex; align-items: center; gap: 6px; }
  .settings-row select { border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 6px 10px; font-size: 14px; font-family: inherit; outline: none; background: #fff; }
  .settings-row input[type=range] { border: none; padding: 0; width: 80px; }

  /* Stats */
  .stats-row { display: flex; gap: 10px; margin-top: 14px; }
  .stat-card { flex: 1; background: var(--gray-light); border-radius: var(--radius-sm); padding: 14px; text-align: center; }
  .stat-num { font-size: 24px; font-weight: 500; }
  .stat-label { font-size: 12px; color: #888780; }
  .stat-card.present .stat-num { color: var(--success); }
  .stat-card.absent .stat-num { color: var(--danger); }
  .stat-card.total .stat-num { color: var(--primary); }

  /* Call detail name tags */
  .call-name-tag {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--gray-light); border: 0.5px solid var(--border);
    border-radius: 20px; padding: 6px 14px; font-size: 14px;
    cursor: pointer; transition: all .2s; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .call-name-tag:active { transform: scale(0.95); }
  .call-name-tag.present { background: var(--success-light); border-color: #9FE1CB; color: var(--success); }
  .call-name-tag.absent { background: var(--danger-light); border-color: #F7C1C1; color: var(--danger); }
  .call-name-tag.calling { background: var(--warning-light); border-color: #FAC775; color: var(--warning); font-weight: 500; }
  .call-name-tag .tag-status { font-size: 11px; opacity: 0.8; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: #2c2c2a; color: #fff; padding: 10px 22px;
    border-radius: 24px; font-size: 14px; opacity: 0;
    transition: all .3s; z-index: 999; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Tab nav */
  .tab-nav {
    display: flex; background: #fff; border-radius: var(--radius-sm);
    border: 0.5px solid var(--border); overflow: hidden; margin-bottom: 14px;
  }
  .tab-btn {
    flex: 1; padding: 12px 8px; font-size: 14px; font-weight: 500;
    border: none; border-radius: 0; background: #fff; color: #888780;
    justify-content: center; transition: all .2s; cursor: pointer;
  }
  .tab-btn.active { color: var(--primary); background: var(--primary-light); }
  .tab-btn:active { background: #eeede9; }
  .tab-btn.active:active { background: #cfe4f7; }
  .section { display: none; }
  .section.active { display: block; }
  .empty-hint { text-align: center; padding: 20px; color: #888780; font-size: 13px; }
  .pulse { animation: pulse 1s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }

  /* Batch add toggle */
  .toggle-link { font-size: 13px; color: var(--primary); cursor: pointer; margin-top: 8px; display: inline-block; }
  .toggle-link:hover { text-decoration: underline; }
  .batch-section { display: none; margin-top: 10px; }
  .batch-section.show { display: block; }
</style>
</head>
<body>
<div class="app">

  <!-- 微信内置浏览器提示 -->
  <div class="wechat-banner" id="wechat-banner">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#d48f00" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <p>语音点名需在系统浏览器中使用。<strong>点右上角 "..." → 选择"在浏览器中打开"</strong>，即可启用语音功能。</p>
  </div>

  <div class="header">
    <h1>自动语音点名</h1>
    <p>管理名单，一键语音点名</p>
  </div>

  <!-- Tab 导航 -->
  <div class="tab-nav">
    <button class="tab-btn active" onclick="goTab(0)">📋 名单管理</button>
    <button class="tab-btn" onclick="goTab(1)">📢 开始点名</button>
  </div>

  <!-- Tab 1: 名单管理 -->
  <div class="section active" id="tab-0">
    <div class="card">
      <div class="card-title">
        <span class="step-badge">1</span>名单管理
        <span style="font-size:12px;font-weight:400;color:#888780;margin-left:auto;" id="name-count">0 人</span>
      </div>
      <div class="names-grid" id="names-grid">
        <p class="empty-hint">还没有姓名，请添加</p>
      </div>
      <div class="add-name-row">
        <input type="text" id="add-name-input" placeholder="输入姓名，回车添加..." maxlength="10">
        <button onclick="addName()">添加</button>
      </div>
      <span class="toggle-link" onclick="toggleBatch()">批量添加（换行分隔）</span>
      <div class="batch-section" id="batch-section">
        <textarea class="batch-input" id="batch-input" placeholder="每行一个姓名，例如：&#10;张三&#10;李四&#10;王五"></textarea>
        <div class="btn-row">
          <button class="btn-primary" onclick="batchAdd()">批量添加</button>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn-danger" onclick="clearAllNames()" style="flex:1;justify-content:center;">清空名单</button>
      </div>
    </div>
  </div>

  <!-- Tab 2: 点名 -->
  <div class="section" id="tab-1">
    <div class="card">
      <div class="card-title"><span class="step-badge">2</span>自动语音点名</div>
      <div class="settings-row">
        <label>语速
          <input type="range" id="rate-slider" min="0.5" max="2" step="0.1" value="0.9">
          <span id="rate-val">0.9x</span>
        </label>
        <label>间隔
          <select id="interval-select">
            <option value="1500">1.5 秒</option>
            <option value="2000" selected>2 秒</option>
            <option value="3000">3 秒</option>
            <option value="4000">4 秒</option>
          </select>
        </label>
        <label>播报次数
          <select id="repeat-select">
            <option value="1">1 次</option>
            <option value="2">2 次</option>
            <option value="3">3 次</option>
          </select>
        </label>
      </div>
      <div class="call-display">
        <div class="current-name" id="current-name">准备就绪</div>
        <div class="call-status" id="call-status">点击"开始点名"播报姓名</div>
      </div>
      <p class="call-progress" id="call-progress"></p>
      <div class="call-controls">
        <button class="btn-success" onclick="startCall()" id="btn-play" style="flex:1;justify-content:center;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          开始点名
        </button>
        <button onclick="pauseCall()" id="btn-pause" disabled>暂停</button>
        <button onclick="stopCall()" id="btn-stop" disabled>停止</button>
        <button onclick="resetCall()">重置</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">
        <span class="step-badge" style="background:#EAF3DE;color:#3B6D11;">✓</span>
        点名详情
        <span style="font-size:12px;font-weight:400;color:#888780;">（点击名字切换到/未到）</span>
        <button onclick="exportResult()" style="margin-left:auto;font-size:12px;padding:6px 12px;">导出结果</button>
      </div>
      <div class="names-grid" id="call-names-grid"></div>
      <div class="stats-row">
        <div class="stat-card total"><div class="stat-num" id="stat-total">0</div><div class="stat-label">总计</div></div>
        <div class="stat-card present"><div class="stat-num" id="stat-present">0</div><div class="stat-label">已到</div></div>
        <div class="stat-card absent"><div class="stat-num" id="stat-absent">0</div><div class="stat-label">未到</div></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ========== 初始名单（修改此处即可预设名单）==========
const DEFAULT_NAMES = [
   '华为', '时代印象', '小米', 'POPMART', '大疆',
  '荣耀honor', 'Samsung', 'Nintendo', '酷乐潮玩', '全棉时代',
  '西西弗书店', 'OPPO', '联想', '畹町', 'ROG玩家国度',
  '华硕', 'VIVO', '饼干的礼物', 'ROYALCOVER', 'OSIM',
  '艾美家', 'Bose', '罗莱超柔床品', '卡游', '追觅',
  'CHAKO LAB', '感觉生活', '科大讯飞', '添可', 'SKG',
  'Gabriel', 'S.A.I Floral art sapce', 'MO&CO.', '雅莹', 'edition',
  'Girdear', 'ZUCZUG', 'OVV', 'Arioseyears', 'MAXMCCOY',
  'Marisfrolg', 'EAH CHANIE', 'Airiqi', '再義', 'Jaehee',
  'iD', 'Miss Sixty', 'Koradior', '播', '陌上染云',
  'KBNE', 'JETEZO', 'IDPAN', '美窝', 'TAMMY TANGS',
  'y.sing', 'indicia', 'HPLY', 'NEXY.CO', 'YUUSAAY',
  'Le Fame', 'MEIYANG', "d'zzit", 'SANCELAND', 'DEKASHELL',
  'BuouBuou', '谜底', 'MARYLING', 'UOOYAA', 'PSALTER',
  'lululemon', 'DESCENTE', 'Adidas Originals', 'Salomon', '蕉下',
  'NIKE', 'NIKE KICKS LOUNGE', 'MLB', 'Adidas Mega', 'GENTSPACE',
  'Air Jordan', 'HOKA', 'HECHTER', 'Calvin Klein Jeans', 'Tommy Hilfiger',
  'The North Face', 'New Balance', '单农', 'JOEONE', 'Lacoste',
  '速写', "C'N'C", 'Cabbeen', 'Puma', '李宁',
  'Asics', 'Skechers', 'Aigle', 'Gafe', 'icebreaker',
  'TAG', '波司登', '伯希和', 'Uniqlo', 'MUJI',
  '蕉内', 'Charles & Keith', 'UGG', 'HOTWIND', 'apm MONACO',
  'ecco', 'HEFANG', '73 Hours', 'Crocs', 'Lord Veshine',
  'BOLON', 'Belle', 'TATA', '宝岛眼镜', 'F2',
  '曼妮芬', 'LA QUEEN', 'ENWEIS', 'DISSONA', '木九十',
  'Calvin Klein Underwear', '玄愿朱砂', '爱慕', 'JOSINY', 'ZIVGREY',
  '静物局', '融和口腔', '海马体照相馆', '楽耳', '美车堂',
  '赛乐杰', '爱回收', '左右宠物', '乐贴'
];

let names = [], callIndex = 0, isPlaying = false, isPaused = false;
let callTimer = null, currentTab = 0, callStatus = {};

// ========== 初始化 ==========
function isWechat() { return /MicroMessenger/i.test(navigator.userAgent); }

window.addEventListener('load', () => {
  if (isWechat()) document.getElementById('wechat-banner').classList.add('show');
  // 加载保存的名单，若无则使用默认
  const saved = localStorage.getItem('rollcall_names');
  if (saved) {
    try { names = JSON.parse(saved); } catch(e) { names = [...DEFAULT_NAMES]; }
  } else {
    names = [...DEFAULT_NAMES];
  }
  renderNames();
  // 初始化语音
  if (window.speechSynthesis) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
  }
});

// 保存名单到 localStorage
function saveNames() {
  localStorage.setItem('rollcall_names', JSON.stringify(names));
}

// ========== Tab 导航 ==========
function goTab(n) {
  if (n === 1 && names.length === 0) { showToast('请先添加姓名'); return; }
  currentTab = n;
  document.querySelectorAll('.section').forEach((s, i) => s.classList.toggle('active', i === n));
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === n));
  if (n === 1) renderCallNames();
  window.scrollTo(0, 0);
}

// ========== 名单管理 ==========
function renderNames() {
  const grid = document.getElementById('names-grid');
  document.getElementById('name-count').textContent = names.length + ' 人';
  if (names.length === 0) {
    grid.innerHTML = '<p class="empty-hint">还没有姓名，请添加</p>';
    return;
  }
  grid.innerHTML = names.map((n, i) => `
    <div class="name-chip" id="chip-${i}">${n}
      <button class="chip-remove" onclick="removeName(${i})">×</button>
    </div>`).join('');
}

function removeName(i) {
  names.splice(i, 1);
  saveNames();
  renderNames();
}

function addName() {
  const input = document.getElementById('add-name-input');
  const val = input.value.trim();
  if (!val) return;
  if (names.includes(val)) { showToast('姓名已存在'); return; }
  names.push(val);
  input.value = '';
  saveNames();
  renderNames();
}

function batchAdd() {
  const textarea = document.getElementById('batch-input');
  const lines = textarea.value.split(/[\n,，、；;\s|｜]+/);
  let added = 0;
  for (const line of lines) {
    const val = line.trim();
    if (val && !names.includes(val)) {
      names.push(val);
      added++;
    }
  }
  textarea.value = '';
  saveNames();
  renderNames();
  if (added > 0) showToast('已添加 ' + added + ' 个姓名');
  else showToast('没有新增姓名（可能已存在）');
}

function clearAllNames() {
  if (names.length === 0) return;
  if (confirm('确定清空所有名单？此操作不可撤销。')) {
    names = [];
    saveNames();
    renderNames();
    showToast('名单已清空');
  }
}

function toggleBatch() {
  document.getElementById('batch-section').classList.toggle('show');
}

// 回车添加
document.getElementById('add-name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addName();
});

// ========== 点名 ==========
function renderCallNames() {
  const grid = document.getElementById('call-names-grid');
  if (names.length === 0) { grid.innerHTML = '<p class="empty-hint">名单为空</p>'; updateStats(); return; }
  grid.innerHTML = names.map((n, i) => {
    const s = callStatus[n] || 'pending';
    const statusText = s === 'present' ? '已到' : s === 'absent' ? '未到' : '';
    return `<div class="call-name-tag ${s === 'present' ? 'present' : s === 'absent' ? 'absent' : ''}" 
                 id="call-chip-${i}" 
                 onclick="toggleStatus(${i})">${n}<span class="tag-status">${statusText}</span></div>`;
  }).join('');
  updateStats();
}

// 点击名字切换状态：pending → absent（未到）→ present（已到）→ absent（未到）循环
function toggleStatus(i) {
  const name = names[i];
  const current = callStatus[name] || 'pending';
  if (current === 'pending' || current === 'absent') {
    callStatus[name] = 'present';
  } else {
    callStatus[name] = 'absent';
  }
  // 更新单个元素，避免全量重渲染
  const chip = document.getElementById('call-chip-' + i);
  if (chip) {
    const s = callStatus[name];
    chip.className = 'call-name-tag ' + (s === 'present' ? 'present' : 'absent');
    chip.querySelector('.tag-status').textContent = s === 'present' ? '已到' : '未到';
  }
  updateStats();
}

function updateStats() {
  const total = names.length;
  const p = names.filter(n => callStatus[n] === 'present').length;
  const a = names.filter(n => callStatus[n] === 'absent').length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-present').textContent = p;
  document.getElementById('stat-absent').textContent = a;
  document.getElementById('call-progress').textContent = total > 0 ? `进度：${p + a} / ${total}` : '';
}

function startCall() {
  if (names.length === 0) { showToast('名单为空'); return; }
  if (isPaused) {
    isPaused = false; isPlaying = true;
    document.getElementById('btn-play').disabled = true;
    document.getElementById('btn-pause').disabled = false;
    document.getElementById('btn-stop').disabled = false;
    callNext(); return;
  }
  callIndex = 0; callStatus = {};
  names.forEach(n => callStatus[n] = 'pending');
  renderCallNames();
  isPlaying = true; isPaused = false;
  document.getElementById('btn-play').disabled = true;
  document.getElementById('btn-pause').disabled = false;
  document.getElementById('btn-stop').disabled = false;
  callNext();
}

function callNext() {
  if (!isPlaying || isPaused) return;
  if (callIndex >= names.length) { finishCall(); return; }
  const name = names[callIndex];
  document.getElementById('current-name').textContent = name;
  document.getElementById('call-status').textContent = '正在点名...';
  document.getElementById('current-name').style.color = '#BA7517';
  const chip = document.getElementById('call-chip-' + callIndex);
  if (chip) {
    chip.className = 'call-name-tag calling';
    chip.querySelector('.tag-status').textContent = '';
    chip.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  // 根据播报次数重复语音
  const repeatCount = parseInt(document.getElementById('repeat-select').value) || 1;
  speakRepeat(name, repeatCount, () => {
    if (!isPlaying || isPaused) return;
    const idx = callIndex;
    const nm = name;
    setTimeout(() => {
      callStatus[nm] = 'present';
      const c = document.getElementById('call-chip-' + idx);
      if (c) {
        c.className = 'call-name-tag present';
        c.querySelector('.tag-status').textContent = '已到';
      }
      updateStats();
      callIndex++;
      const interval = parseInt(document.getElementById('interval-select').value);
      callTimer = setTimeout(callNext, interval);
    }, 300);
  });
}

// 重复播报名字
function speakRepeat(text, count, onEnd) {
  if (!window.speechSynthesis) {
    if (isWechat()) showToast('请在浏览器中打开以使用语音');
    else showToast('浏览器不支持语音合成');
    setTimeout(() => onEnd && onEnd(), 500);
    return;
  }
  if (count <= 0) count = 1;
  let done = 0;
  function speakOnce() {
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.rate = parseFloat(document.getElementById('rate-slider').value);
    utt.lang = 'zh-CN';
    utt.pitch = 1.05;
    const voices = window.speechSynthesis.getVoices();
    const zhVoice = voices.find(v => v.lang && v.lang.startsWith('zh'));
    if (zhVoice) utt.voice = zhVoice;
    utt.onend = () => {
      done++;
      if (done < count && isPlaying && !isPaused) {
        // 每次播报之间短暂间隔
        setTimeout(speakOnce, 400);
      } else {
        onEnd && onEnd();
      }
    };
    utt.onerror = () => {
      done++;
      if (done < count && isPlaying && !isPaused) {
        setTimeout(speakOnce, 400);
      } else {
        onEnd && onEnd();
      }
    };
    window.speechSynthesis.speak(utt);
  }
  speakOnce();
}

function pauseCall() {
  if (!isPlaying) return;
  isPaused = true; isPlaying = false;
  if (callTimer) clearTimeout(callTimer);
  window.speechSynthesis && window.speechSynthesis.cancel();
  document.getElementById('btn-play').disabled = false;
  document.getElementById('btn-play').innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 继续点名';
  document.getElementById('btn-pause').disabled = true;
  document.getElementById('call-status').textContent = '已暂停';
  document.getElementById('current-name').style.color = '#888780';
}

function stopCall() {
  isPlaying = false; isPaused = false;
  if (callTimer) clearTimeout(callTimer);
  window.speechSynthesis && window.speechSynthesis.cancel();
  document.getElementById('btn-play').disabled = false;
  document.getElementById('btn-play').innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 开始点名';
  document.getElementById('btn-pause').disabled = true;
  document.getElementById('btn-stop').disabled = true;
  document.getElementById('current-name').textContent = '已停止';
  document.getElementById('call-status').textContent = '点击"开始点名"重新开始';
  document.getElementById('current-name').style.color = '#888780';
}

function finishCall() {
  isPlaying = false; isPaused = false;
  if (callTimer) clearTimeout(callTimer);
  document.getElementById('btn-play').disabled = false;
  document.getElementById('btn-play').innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 开始点名';
  document.getElementById('btn-pause').disabled = true;
  document.getElementById('btn-stop').disabled = true;
  const pCount = names.filter(n => callStatus[n] === 'present').length;
  const aCount = names.filter(n => callStatus[n] === 'absent').length;
  document.getElementById('current-name').textContent = '点名完成';
  document.getElementById('current-name').style.color = '#3B6D11';
  document.getElementById('call-status').textContent = `总计 ${names.length} 人，已到 ${pCount} 人，未到 ${aCount} 人`;
  // 播报完成提示
  speakOnce('点名完成，已到' + pCount + '人，未到' + aCount + '人');
  showToast('点名完成！');
}

function speakOnce(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = parseFloat(document.getElementById('rate-slider').value);
  utt.lang = 'zh-CN'; utt.pitch = 1.05;
  const voices = window.speechSynthesis.getVoices();
  const zhVoice = voices.find(v => v.lang && v.lang.startsWith('zh'));
  if (zhVoice) utt.voice = zhVoice;
  window.speechSynthesis.speak(utt);
}

function resetCall() {
  stopCall();
  callIndex = 0; callStatus = {};
  names.forEach(n => callStatus[n] = 'pending');
  renderCallNames();
  document.getElementById('current-name').textContent = '准备就绪';
  document.getElementById('call-status').textContent = '点击"开始点名"播报姓名';
  document.getElementById('current-name').style.color = '#185FA5';
}

function exportResult() {
  const now = new Date().toLocaleString('zh-CN');
  const pCount = names.filter(n => callStatus[n] === 'present').length;
  const aCount = names.filter(n => callStatus[n] === 'absent').length;
  let content = `点名结果 - ${now}\n${'='.repeat(28)}\n总计：${names.length} 人\n已到：${pCount} 人\n未到：${aCount} 人\n\n--- 已到 ---\n`;
  let idx = 1;
  names.forEach(n => { if (callStatus[n] === 'present') content += `${idx++}. ${n}\n`; });
  content += `\n--- 未到 ---\n`;
  idx = 1;
  names.forEach(n => { if (callStatus[n] === 'absent') content += `${idx++}. ${n}\n`; });
  content += `\n--- 未标记 ---\n`;
  idx = 1;
  names.forEach(n => { if (callStatus[n] === 'pending') content += `${idx++}. ${n}\n`; });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type: 'text/plain;charset=utf-8' }));
  a.download = '点名结果_' + new Date().toLocaleDateString('zh-CN').replace(/\//g, '-') + '.txt';
  a.click();
  showToast('结果已导出');
}

// 语速滑块
document.getElementById('rate-slider').addEventListener('input', function() {
  document.getElementById('rate-val').textContent = parseFloat(this.value).toFixed(1) + 'x';
});

// Toast
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
