<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#185FA5">
<title>拍照识别自动点名</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #185FA5; --primary-light: #E6F1FB;
    --success: #3B6D11; --success-light: #EAF3DE;
    --danger: #A32D2D; --danger-light: #FCEBEB;
    --warning: #854F0B; --warning-light: #FAEEDA;
    --gray: #5F5E5A; --gray-light: #F1EFE8;
    --border: rgba(0,0,0,0.12);
    --radius: 12px; --radius-sm: 8px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f5f4f0; min-height: 100vh; color: #2c2c2a;
    font-size: 15px; line-height: 1.6; -webkit-text-size-adjust: 100%;
  }
  .app { max-width: 520px; margin: 0 auto; padding: 16px 14px 80px; }

  /* Wechat Banner */
  .wechat-banner {
    background: #fff8e6; border: 1px solid #f5c518;
    border-radius: var(--radius-sm); padding: 10px 14px;
    margin-bottom: 14px; display: none; align-items: flex-start; gap: 10px;
  }
  .wechat-banner.show { display: flex; }
  .wechat-banner svg { flex-shrink: 0; margin-top: 2px; }
  .wechat-banner p { font-size: 13px; line-height: 1.5; color: #6b4700; }
  .wechat-banner strong { font-weight: 500; }

  .header { text-align: center; padding: 20px 0 16px; }
  .header h1 { font-size: 20px; font-weight: 500; color: #2c2c2a; margin-bottom: 5px; }
  .header p { font-size: 13px; color: #888780; }

  .card {
    background: #fff; border-radius: var(--radius);
    border: 0.5px solid var(--border); padding: 18px;
    margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .card-title {
    font-size: 14px; font-weight: 500; color: #2c2c2a;
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .step-badge {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--primary-light); color: var(--primary);
    font-size: 12px; font-weight: 500;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .upload-zone {
    border: 1.5px dashed var(--border); border-radius: var(--radius-sm);
    padding: 28px 16px; text-align: center; cursor: pointer;
    transition: border-color .2s, background .2s; position: relative; overflow: hidden;
  }
  .upload-zone:hover, .upload-zone.drag-over { border-color: var(--primary); background: var(--primary-light); }
  .upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-icon {
    width: 52px; height: 52px; border-radius: 50%; background: var(--primary-light);
    display: flex; align-items: center; justify-content: center; margin: 0 auto 12px;
  }
  .upload-zone p { font-size: 14px; color: #5F5E5A; }
  .upload-zone small { font-size: 12px; color: #888780; }
  .btn-row { display: flex; gap: 10px; margin-top: 12px; }
  button {
    border: 0.5px solid var(--border); border-radius: var(--radius-sm);
    background: #fff; font-size: 14px; padding: 10px 16px;
    cursor: pointer; font-family: inherit; color: #2c2c2a;
    display: flex; align-items: center; gap: 6px;
    transition: background .15s, border-color .15s; white-space: nowrap;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  button:active { background: #eeede9; }
  .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); flex: 1; justify-content: center; }
  .btn-primary:active { background: #0F4A85; }
  .btn-primary:disabled { background: #B5D4F4; border-color: #B5D4F4; cursor: not-allowed; }
  .btn-success { background: var(--success); color: #fff; border-color: var(--success); flex: 1; justify-content: center; }
  .btn-success:active { background: #2a5409; }
  .btn-danger { background: var(--danger); color: #fff; border-color: var(--danger); }
  #preview-img { display: none; width: 100%; max-height: 260px; object-fit: contain; border-radius: var(--radius-sm); border: 0.5px solid var(--border); margin-bottom: 12px; background: #f5f4f0; }
  #preview-img.show { display: block; }
  #camera-container { display: none; position: relative; border-radius: var(--radius-sm); overflow: hidden; margin-bottom: 12px; }
  #camera-container.show { display: block; }
  #camera-video { width: 100%; max-height: 260px; background: #000; display: block; border-radius: var(--radius-sm); }
  #camera-canvas { display: none; }
  .progress-bar { height: 4px; background: #e0deda; border-radius: 2px; overflow: hidden; margin: 8px 0; }
  .progress-fill { height: 100%; background: var(--primary); border-radius: 2px; transition: width .3s; width: 0%; }
  .status-text { font-size: 12px; color: #888780; text-align: center; }
  .names-grid { display: flex; flex-wrap: wrap; gap: 8px; min-height: 40px; margin-bottom: 12px; }
  .name-chip {
    background: var(--gray-light); border: 0.5px solid var(--border);
    border-radius: 20px; padding: 6px 14px; font-size: 14px;
    display: flex; align-items: center; gap: 6px;
  }
  .name-chip.present { background: var(--success-light); border-color: #9FE1CB; color: var(--success); }
  .name-chip.absent { background: var(--danger-light); border-color: #F7C1C1; color: var(--danger); text-decoration: line-through; }
  .name-chip.calling { background: var(--warning-light); border-color: #FAC775; color: var(--warning); font-weight: 500; }
  .chip-remove {
    width: 18px; height: 18px; background: rgba(0,0,0,0.1); border: none;
    border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: inherit; padding: 0; flex-shrink: 0;
  }
  .add-name-row { display: flex; gap: 8px; margin-top: 8px; }
  .add-name-row input {
    flex: 1; border: 0.5px solid var(--border); border-radius: var(--radius-sm);
    padding: 10px 14px; font-size: 15px; font-family: inherit; outline: none;
    transition: border-color .15s;
  }
  .add-name-row input:focus { border-color: var(--primary); }
  .call-display {
    text-align: center; padding: 32px 20px;
    background: var(--gray-light); border-radius: var(--radius-sm);
    margin-bottom: 14px; min-height: 120px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .current-name { font-size: 40px; font-weight: 500; color: var(--primary); letter-spacing: 5px; margin-bottom: 8px; transition: all .3s; }
  .call-status { font-size: 13px; color: #888780; }
  .call-progress { font-size: 13px; color: #888780; margin-bottom: 12px; }
  .call-controls { display: flex; gap: 10px; flex-wrap: wrap; }
  .settings-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
  .settings-row label { font-size: 13px; color: #5F5E5A; display: flex; align-items: center; gap: 6px; }
  .settings-row select { border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 6px 10px; font-size: 14px; font-family: inherit; outline: none; background: #fff; }
  .settings-row input[type=range] { border: none; padding: 0; width: 80px; }
  .stats-row { display: flex; gap: 10px; margin-top: 14px; }
  .stat-card { flex: 1; background: var(--gray-light); border-radius: var(--radius-sm); padding: 14px; text-align: center; }
  .stat-num { font-size: 24px; font-weight: 500; }
  .stat-label { font-size: 12px; color: #888780; }
  .stat-card.present .stat-num { color: var(--success); }
  .stat-card.absent .stat-num { color: var(--danger); }
  .stat-card.total .stat-num { color: var(--primary); }
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: #2c2c2a; color: #fff; padding: 10px 22px;
    border-radius: 24px; font-size: 14px; opacity: 0;
    transition: all .3s; z-index: 999; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .steps-nav { display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 18px; }
  .step-dot { width: 8px; height: 8px; border-radius: 50%; background: #d3d1c7; transition: all .3s; cursor: pointer; }
  .step-dot.active { background: var(--primary); width: 20px; border-radius: 4px; }
  .step-dot.done { background: #9FE1CB; }
  .section { display: none; }
  .section.active { display: block; }
  .empty-hint { text-align: center; padding: 20px; color: #888780; font-size: 13px; }
  .pulse { animation: pulse 1s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
</style>
</head>
<body>
<div class="app">

  <!-- 微信内置浏览器提示 -->
  <div class="wechat-banner" id="wechat-banner">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#d48f00" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <p>语音点名需在系统浏览器中使用。<strong>点右上角 "..." → 选择"在浏览器中打开"</strong>，即可启用语音功能。拍照识别功能在微信中正常使用。</p>
  </div>

  <div class="header">
    <h1>拍照识别自动点名</h1>
    <p>拍摄名单照片，自动识别姓名，语音逐一点名</p>
  </div>

  <div class="steps-nav">
    <div class="step-dot active" onclick="goStep(0)"></div>
    <div class="step-dot" onclick="goStep(1)"></div>
    <div class="step-dot" onclick="goStep(2)"></div>
  </div>

  <!-- Step 1: 上传图片 -->
  <div class="section active" id="step-0">
    <div class="card">
      <div class="card-title"><span class="step-badge">1</span>上传名单照片</div>
      <div id="camera-container">
        <video id="camera-video" autoplay playsinline></video>
        <canvas id="camera-canvas"></canvas>
      </div>
      <img id="preview-img" alt="预览图片">
      <div class="upload-zone" id="upload-zone">
        <input type="file" id="file-input" accept="image/*" capture="environment">
        <div class="upload-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#185FA5" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </div>
        <p>点击上传 / 拍照</p>
        <small>支持黑板、纸质名单、截图等</small>
      </div>
      <div class="btn-row">
        <button onclick="openCamera()" id="btn-camera">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          摄像头拍照
        </button>
        <button onclick="manualInput()" style="flex:1;justify-content:center;">手动输入名单</button>
      </div>
      <div id="ocr-section" style="display:none;margin-top:14px;">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <p class="status-text" id="ocr-status">图片已加载，点击下方按钮开始识别</p>
        <div class="btn-row" style="margin-top:10px;">
          <button class="btn-primary" onclick="startOCR()" id="btn-ocr">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            开始识别文字
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Step 2: 名单编辑 -->
  <div class="section" id="step-1">
    <div class="card">
      <div class="card-title">
        <span class="step-badge">2</span>确认名单
        <span style="font-size:12px;font-weight:400;color:#888780;margin-left:auto;" id="name-count">0 人</span>
      </div>
      <div class="names-grid" id="names-grid">
        <p class="empty-hint">识别完成后姓名会显示在这里</p>
      </div>
      <div class="add-name-row">
        <input type="text" id="add-name-input" placeholder="手动添加姓名..." maxlength="10">
        <button onclick="addName()">添加</button>
      </div>
      <div class="btn-row" style="margin-top:14px;">
        <button onclick="goStep(0)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          重新识别
        </button>
        <button class="btn-success" onclick="goStep(2)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          开始点名
        </button>
      </div>
    </div>
  </div>

  <!-- Step 3: 点名 -->
  <div class="section" id="step-2">
    <div class="card">
      <div class="card-title"><span class="step-badge">3</span>自动语音点名</div>
      <div class="settings-row">
        <label>语速
          <input type="range" id="rate-slider" min="0.5" max="2" step="0.1" value="0.9">
          <span id="rate-val">0.9x</span>
        </label>
        <label>间隔
          <select id="interval-select">
            <option value="1500">1.5 秒</option>
            <option value="2000" selected>2 秒</option>
            <option value="3000">3 秒</option>
            <option value="4000">4 秒</option>
          </select>
        </label>
      </div>
      <div class="call-display">
        <div class="current-name" id="current-name">准备就绪</div>
        <div class="call-status" id="call-status">点击"开始点名"播报姓名</div>
      </div>
      <p class="call-progress" id="call-progress"></p>
      <div class="call-controls">
        <button class="btn-success" onclick="startCall()" id="btn-play" style="flex:1;justify-content:center;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          开始点名
        </button>
        <button onclick="pauseCall()" id="btn-pause" disabled>暂停</button>
        <button onclick="stopCall()" id="btn-stop" disabled>停止</button>
        <button onclick="resetCall()">重置</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">
        <span class="step-badge" style="background:#EAF3DE;color:#3B6D11;">✓</span>
        点名详情
        <button onclick="exportResult()" style="margin-left:auto;font-size:12px;padding:6px 12px;">导出结果</button>
      </div>
      <div class="names-grid" id="call-names-grid"></div>
      <div class="stats-row">
        <div class="stat-card total"><div class="stat-num" id="stat-total">0</div><div class="stat-label">总计</div></div>
        <div class="stat-card present"><div class="stat-num" id="stat-present">0</div><div class="stat-label">已点到</div></div>
        <div class="stat-card absent"><div class="stat-num" id="stat-absent">0</div><div class="stat-label">未点到</div></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
let names = [], callIndex = 0, isPlaying = false, isPaused = false;
let callTimer = null, cameraStream = null, currentStep = 0, callStatus = {};

// 检测微信浏览器
function isWechat() { return /MicroMessenger/i.test(navigator.userAgent); }
window.addEventListener('load', () => {
  if (isWechat()) document.getElementById('wechat-banner').classList.add('show');
  if (window.speechSynthesis) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
  }
});

// Navigation
function goStep(n) {
  if (n === 2 && names.length === 0) { showToast('请先添加姓名'); return; }
  currentStep = n;
  document.querySelectorAll('.section').forEach((s, i) => s.classList.toggle('active', i === n));
  document.querySelectorAll('.step-dot').forEach((d, i) => {
    d.classList.toggle('active', i === n); d.classList.toggle('done', i < n);
  });
  if (n === 2) renderCallNames();
  window.scrollTo(0, 0);
}

// Upload / Camera
document.getElementById('file-input').addEventListener('change', function(e) {
  const file = e.target.files[0]; if (!file) return;
  closeCamera();
  showPreview(URL.createObjectURL(file));
});
const uploadZone = document.getElementById('upload-zone');
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault(); uploadZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) { closeCamera(); showPreview(URL.createObjectURL(file)); }
});
function showPreview(url) {
  const img = document.getElementById('preview-img');
  img.src = url; img.classList.add('show');
  document.getElementById('upload-zone').style.display = 'none';
  document.getElementById('ocr-section').style.display = 'block';
  document.getElementById('ocr-status').textContent = '图片已加载，点击"开始识别文字"';
  document.getElementById('progress-fill').style.width = '0%';
}
async function openCamera() {
  if (cameraStream) { closeCamera(); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    cameraStream = stream;
    const video = document.getElementById('camera-video');
    video.srcObject = stream;
    document.getElementById('camera-container').classList.add('show');
    const btn = document.getElementById('btn-camera');
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M7 21v-1a5 5 0 0 1 10 0v1"/></svg> 点击拍照';
    btn.onclick = capturePhoto;
    document.getElementById('upload-zone').style.display = 'none';
  } catch(e) { showToast('无法访问摄像头'); }
}
function capturePhoto() {
  const video = document.getElementById('camera-video');
  const canvas = document.getElementById('camera-canvas');
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  closeCamera(); showPreview(canvas.toDataURL('image/png'));
}
function closeCamera() {
  if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
  document.getElementById('camera-container').classList.remove('show');
  const btn = document.getElementById('btn-camera');
  btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> 摄像头拍照';
  btn.onclick = openCamera;
}
function manualInput() { names = []; renderNames(); goStep(1); }

// OCR
async function startOCR() {
  const img = document.getElementById('preview-img');
  if (!img.src || img.src === window.location.href) { showToast('请先上传图片'); return; }
  const btn = document.getElementById('btn-ocr');
  btn.disabled = true;
  btn.innerHTML = '<span class="pulse">识别中...</span>';
  try {
    const worker = await Tesseract.createWorker('chi_sim+eng', 1, {
      logger: m => {
        if (m.status === 'recognizing text') {
          const pct = Math.round(m.progress * 100);
          document.getElementById('progress-fill').style.width = pct + '%';
          document.getElementById('ocr-status').textContent = '识别中 ' + pct + '%...';
        } else {
          document.getElementById('ocr-status').textContent = m.status + '...';
        }
      }
    });
    const { data: { text } } = await worker.recognize(img.src);
    await worker.terminate();
    document.getElementById('ocr-status').textContent = '识别完成，正在提取姓名...';
    document.getElementById('progress-fill').style.width = '100%';
    const extracted = extractNames(text);
    if (extracted.length > 0) {
      names = [...new Set([...names, ...extracted])];
      renderNames(); goStep(1);
      showToast('识别到 ' + extracted.length + ' 个姓名');
    } else {
      goStep(1); showToast('未识别到姓名，请手动添加');
    }
  } catch(e) {
    document.getElementById('ocr-status').textContent = '识别失败，请手动添加';
    btn.disabled = false; btn.textContent = '重新识别';
    showToast('识别失败，请手动输入');
  }
}
function extractNames(raw) {
  const lines = raw.split(/[\n\r,，、；;\s|｜]+/);
  const result = [];
  const reg = /^[\u4e00-\u9fa5]{2,4}$/;
  const stopWords = new Set(['名单','学生','同学','班级','姓名','序号','编号','备注','出勤','签到','请假','迟到','应到','实到']);
  for (const line of lines) {
    const t = line.trim().replace(/[^\u4e00-\u9fa5a-zA-Z0-9]/g, '');
    if (reg.test(t) && !stopWords.has(t)) { result.push(t); continue; }
    const ms = t.match(/[\u4e00-\u9fa5]{2,4}/g);
    if (ms) for (const m of ms) if (!stopWords.has(m)) result.push(m);
  }
  return [...new Set(result)];
}

// Name list
function renderNames() {
  const grid = document.getElementById('names-grid');
  document.getElementById('name-count').textContent = names.length + ' 人';
  if (names.length === 0) { grid.innerHTML = '<p class="empty-hint">还没有姓名，请上传图片或手动添加</p>'; return; }
  grid.innerHTML = names.map((n, i) => `
    <div class="name-chip" id="chip-${i}">${n}
      <button class="chip-remove" onclick="removeName(${i})">×</button>
    </div>`).join('');
}
function removeName(i) { names.splice(i, 1); renderNames(); }
function addName() {
  const input = document.getElementById('add-name-input');
  const val = input.value.trim(); if (!val) return;
  if (names.includes(val)) { showToast('姓名已存在'); return; }
  names.push(val); input.value = ''; renderNames();
}
document.getElementById('add-name-input').addEventListener('keydown', e => { if (e.key === 'Enter') addName(); });

// Roll call
function renderCallNames() {
  const grid = document.getElementById('call-names-grid');
  if (names.length === 0) { grid.innerHTML = '<p class="empty-hint">名单为空</p>'; return; }
  grid.innerHTML = names.map((n, i) => {
    const s = callStatus[n] || 'pending';
    return `<div class="name-chip ${s === 'present' ? 'present' : s === 'absent' ? 'absent' : ''}" id="call-chip-${i}">${n}</div>`;
  }).join('');
  updateStats();
}
function updateStats() {
  const total = names.length;
  const p = Object.values(callStatus).filter(v => v === 'present').length;
  const a = Object.values(callStatus).filter(v => v === 'absent').length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-present').textContent = p;
  document.getElementById('stat-absent').textContent = a;
  document.getElementById('call-progress').textContent = total > 0 ? `进度：${p+a} / ${total}` : '';
}
function startCall() {
  if (names.length === 0) { showToast('名单为空'); return; }
  if (isPaused) {
    isPaused = false; isPlaying = true;
    document.getElementById('btn-play').disabled = true;
    document.getElementById('btn-pause').disabled = false;
    document.getElementById('btn-stop').disabled = false;
    callNext(); return;
  }
  callIndex = 0; callStatus = {};
  names.forEach(n => callStatus[n] = 'pending');
  renderCallNames();
  isPlaying = true; isPaused = false;
  document.getElementById('btn-play').disabled = true;
  document.getElementById('btn-pause').disabled = false;
  document.getElementById('btn-stop').disabled = false;
  callNext();
}
function callNext() {
  if (!isPlaying || isPaused) return;
  if (callIndex >= names.length) { finishCall(); return; }
  const name = names[callIndex];
  document.getElementById('current-name').textContent = name;
  document.getElementById('call-status').textContent = '正在点名...';
  document.getElementById('current-name').style.color = '#BA7517';
  const chip = document.getElementById('call-chip-' + callIndex);
  if (chip) { chip.className = 'name-chip calling'; chip.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
  speak(name, () => {
    if (!isPlaying || isPaused) return;
    const idx = callIndex; const nm = name;
    setTimeout(() => {
      callStatus[nm] = 'present';
      const c = document.getElementById('call-chip-' + idx);
      if (c) c.className = 'name-chip present';
      updateStats(); callIndex++;
      const interval = parseInt(document.getElementById('interval-select').value);
      callTimer = setTimeout(callNext, interval);
    }, 300);
  });
}
function speak(text, onEnd) {
  if (!window.speechSynthesis) {
    if (isWechat()) showToast('请在浏览器中打开以使用语音');
    else showToast('浏览器不支持语音合成');
    setTimeout(() => onEnd && onEnd(), 500); return;
  }
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = parseFloat(document.getElementById('rate-slider').value);
  utt.lang = 'zh-CN'; utt.pitch = 1.05;
  const voices = window.speechSynthesis.getVoices();
  const zhVoice = voices.find(v => v.lang && v.lang.startsWith('zh'));
  if (zhVoice) utt.voice = zhVoice;
  utt.onend = onEnd; utt.onerror = () => onEnd && onEnd();
  window.speechSynthesis.speak(utt);
}
function pauseCall() {
  if (!isPlaying) return; isPaused = true; isPlaying = false;
  if (callTimer) clearTimeout(callTimer);
  window.speechSynthesis && window.speechSynthesis.pause();
  document.getElementById('btn-play').disabled = false;
  document.getElementById('btn-pause').disabled = true;
  document.getElementById('call-status').textContent = '已暂停';
  document.getElementById('current-name').style.color = '#888780';
}
function stopCall() {
  isPlaying = false; isPaused = false;
  if (callTimer) clearTimeout(callTimer);
  window.speechSynthesis && window.speechSynthesis.cancel();
  document.getElementById('btn-play').disabled = false;
  document.getElementById('btn-pause').disabled = true;
  document.getElementById('btn-stop').disabled = true;
  document.getElementById('current-name').textContent = '已停止';
  document.getElementById('call-status').textContent = '点击"开始点名"重新开始';
  document.getElementById('current-name').style.color = '#888780';
}
function finishCall() {
  isPlaying = false; isPaused = false;
  if (callTimer) clearTimeout(callTimer);
  document.getElementById('btn-play').disabled = false;
  document.getElementById('btn-pause').disabled = true;
  document.getElementById('btn-stop').disabled = true;
  document.getElementById('current-name').textContent = '点名完成';
  document.getElementById('current-name').style.color = '#3B6D11';
  document.getElementById('call-status').textContent = '全部 ' + names.length + ' 人已点名完毕';
  speak('点名完成，共计' + names.length + '人');
  showToast('点名完成！共 ' + names.length + ' 人');
}
function resetCall() {
  stopCall(); callIndex = 0; callStatus = {};
  names.forEach(n => callStatus[n] = 'pending');
  renderCallNames();
  document.getElementById('current-name').textContent = '准备就绪';
  document.getElementById('call-status').textContent = '点击"开始点名"播报姓名';
  document.getElementById('current-name').style.color = '#185FA5';
}
function exportResult() {
  const now = new Date().toLocaleString('zh-CN');
  let content = `点名结果 - ${now}\n${'='.repeat(28)}\n总计：${names.length} 人\n已点：${Object.values(callStatus).filter(v=>v==='present').length} 人\n未点：${Object.values(callStatus).filter(v=>v!=='present').length} 人\n\n--- 名单 ---\n`;
  names.forEach((n, i) => { content += `${i+1}. ${n} ${callStatus[n]==='present'?'[到]':'[--]'}\n`; });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type: 'text/plain;charset=utf-8' }));
  a.download = '点名结果_' + new Date().toLocaleDateString('zh-CN').replace(/\//g,'-') + '.txt';
  a.click(); showToast('结果已导出');
}
document.getElementById('rate-slider').addEventListener('input', function() {
  document.getElementById('rate-val').textContent = parseFloat(this.value).toFixed(1) + 'x';
});
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
</body>
</html>
